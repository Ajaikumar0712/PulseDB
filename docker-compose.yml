services:
  # ── Single-node PulseDB (default) ─────────────────────────────────────────
  pulsedb:
    image: pulsedb/pulsedb:latest
    build: .
    ports:
      - "7878:7878"
    volumes:
      # Named volume keeps data across container restarts.
      # To use a host path instead: ./data:/var/lib/pulsedb
      - pulsedb-data:/var/lib/pulsedb
    environment:
      # Tune log verbosity: trace | debug | info | warn | error
      PULSEDB_LOG_LEVEL: info
    command:
      - pulsedb-server
      - --addr
      - "0.0.0.0:7878"
      - --data-dir
      - /var/lib/pulsedb
      - --log-level
      - "${PULSEDB_LOG_LEVEL:-info}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c",
             "echo '{\"query\":\"SHOW TABLES\"}' | nc -q1 127.0.0.1 7878 | grep -q status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── Three-node cluster example ────────────────────────────────────────────
