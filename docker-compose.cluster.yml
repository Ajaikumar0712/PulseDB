services:

  # ── Node 1 — primary (host port 7878) ─────────────────────────────────────
  node1:
    image: pulsedb/pulsedb:latest
    build: .
    container_name: pulsedb-node1
    hostname: node1
    ports:
      - "7878:7878"    # accessible from host for REPL testing
    volumes:
      - node1-data:/var/lib/pulsedb:rw
    env_file: .env
    command:
      - pulsedb-server
      - --addr
      - "0.0.0.0:7878"
      - --data-dir
      - /var/lib/pulsedb
      - --log-level
      - "${PULSEDB_LOG_LEVEL:-info}"
    tmpfs:
      - /tmp
    networks:
      cluster:
        aliases: [node1]
    healthcheck:
      test: ["CMD", "sh", "-c",
             "echo '{\"query\":\"SHOW TABLES\"}' | nc -q1 127.0.0.1 7878 | grep -q status"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ── Node 2 (host port 7880) ────────────────────────────────────────────────
  node2:
    image: pulsedb/pulsedb:latest
    build: .
    container_name: pulsedb-node2
    hostname: node2
    ports:
      - "7880:7878"    # accessible from host on port 7880
    volumes:
      - node2-data:/var/lib/pulsedb:rw
    env_file: .env
    command:
      - pulsedb-server
      - --addr
      - "0.0.0.0:7878"
      - --data-dir
      - /var/lib/pulsedb
      - --log-level
      - "${PULSEDB_LOG_LEVEL:-info}"
    tmpfs:
      - /tmp
    networks:
      cluster:
        aliases: [node2]
    healthcheck:
      test: ["CMD", "sh", "-c",
             "echo '{\"query\":\"SHOW TABLES\"}' | nc -q1 127.0.0.1 7878 | grep -q status"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ── Node 3 (host port 7882) ────────────────────────────────────────────────
  node3:
    image: pulsedb/pulsedb:latest
    build: .
    container_name: pulsedb-node3
    hostname: node3
    ports:
      - "7882:7878"    # accessible from host on port 7882
    volumes:
      - node3-data:/var/lib/pulsedb:rw
    env_file: .env
    command:
      - pulsedb-server
      - --addr
      - "0.0.0.0:7878"
      - --data-dir
      - /var/lib/pulsedb
      - --log-level
      - "${PULSEDB_LOG_LEVEL:-info}"
    tmpfs:
      - /tmp
    networks:
      cluster:
        aliases: [node3]
    healthcheck:
      test: ["CMD", "sh", "-c",
             "echo '{\"query\":\"SHOW TABLES\"}' | nc -q1 127.0.0.1 7878 | grep -q status"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ── Cluster setup — runs once, joins nodes together ───────────────────────
  cluster-setup:
    image: pulsedb/pulsedb:latest
    container_name: pulsedb-cluster-setup
    depends_on:
      node1:
        condition: service_healthy
      node2:
        condition: service_healthy
      node3:
        condition: service_healthy
    networks:
      - cluster
    # Wait for all nodes to be ready, then join them into a cluster.
    # All queries for each node are sent through ONE nc connection so
    # the AUTH session is preserved for the CLUSTER JOIN commands.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "All nodes healthy — joining cluster..."
        P="${PULSEDB_ADMIN_PASSWORD:-change-me-strong-password}"

        join_node() {
          local HOST=$1; local PEER1=$2; local PEER2=$3
          printf '{"query":"AUTH admin '\''%s'\''"}\n{"query":"CLUSTER JOIN \\"%s:7878\\""}\n{"query":"CLUSTER JOIN \\"%s:7878\\""}\n{"query":"CLUSTER STATUS"}\n' \
            "$P" "$PEER1" "$PEER2" | nc -q3 "$HOST" 7878
        }

        echo "--- Joining node1 ---"
        join_node node1 node2 node3

        echo "--- Joining node2 ---"
        join_node node2 node1 node3

        echo "--- Joining node3 ---"
        join_node node3 node1 node2

        echo ""
        echo "Cluster setup complete."
        echo "  Node 1 → pulsedb-repl --addr 127.0.0.1:7878"
        echo "  Node 2 → pulsedb-repl --addr 127.0.0.1:7880"
        echo "  Node 3 → pulsedb-repl --addr 127.0.0.1:7882"
    restart: "no"
    env_file: .env

networks:
  cluster:
    driver: bridge

volumes:
  node1-data:
  node2-data:
  node3-data:
